<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="70%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </radialGradient>
    <linearGradient id="strokeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="fingerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- 圆形背景 -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGrad)"/>

  <!-- 外圈装饰 -->
  <circle cx="256" cy="256" r="235" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="2"/>
  <circle cx="256" cy="256" r="225" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>

  <!-- 交互核心：两个重叠的"页面"或"卡片" -->
  <rect x="140" y="160" width="220" height="160" rx="24" fill="none" stroke="url(#strokeGrad)" stroke-width="6" opacity="0.9" filter="url(#shadow)"/>
  <rect x="170" y="190" width="220" height="160" rx="24" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.2" stroke-width="2"/>

  <!-- 页面内的交互元素：光标点击 + 双向箭头 -->
  <!-- 光标（手指点击） -->
  <g transform="translate(240, 220)">
    <path d="M20,30 L30,45 L42,42 L48,55 L60,48 L52,35 L62,28 L50,20 L42,30 Z" fill="url(#fingerGrad)" filter="url(#shadow)"/>
    <!-- 点击波纹 -->
    <circle cx="40" cy="38" r="20" fill="none" stroke="#fbbf24" stroke-width="2" opacity="0.6">
      <animate attributeName="r" values="20;40;20" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0;0.6" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="40" cy="38" r="28" fill="none" stroke="#f97316" stroke-width="1.5" opacity="0.4">
      <animate attributeName="r" values="28;50;28" dur="2s" repeatCount="indefinite" begin="0.5s"/>
      <animate attributeName="opacity" values="0.4;0;0.4" dur="2s" repeatCount="indefinite" begin="0.5s"/>
    </circle>
  </g>

  <!-- 页面间的双向箭头（交互流向） -->
  <g stroke="#ffffff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- 箭头弧线1：从左上到右下 -->
    <path d="M 200 280 Q 256 320 310 280" stroke="#38bdf8" opacity="0.9"/>
    <polygon points="310,280 298,272 300,288" fill="#38bdf8" stroke="none"/>
    <!-- 箭头弧线2：从右下到左上 -->
    <path d="M 310 250 Q 256 210 200 250" stroke="#a78bfa" opacity="0.9"/>
    <polygon points="200,250 212,242 210,258" fill="#a78bfa" stroke="none"/>
  </g>

  <!-- 装饰性小圆点：代表数据/交互节点 -->
  <circle cx="180" cy="270" r="6" fill="#38bdf8" opacity="0.8"/>
  <circle cx="330" cy="270" r="6" fill="#a78bfa" opacity="0.8"/>
  <circle cx="256" cy="330" r="5" fill="#ffffff" opacity="0.5"/>

  <!-- 顶部极简网格，增强技术感 -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1.5">
    <line x1="100" y1="256" x2="412" y2="256"/>
    <line x1="256" y1="100" x2="256" y2="412"/>
  </g>
</svg>
